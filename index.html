<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hijabers AV - Nonton Video Viral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background-color: #0a0a0a; 
            color: #e5e5e5; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        /* Efek Zoom untuk memotong logo dan judul bawaan YouTube */
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Rasio 16:9 */
            overflow: hidden;
            background-color: #000;
            border-radius: 0.5rem;
        }
        
        .video-container iframe {
            position: absolute;
            top: -15%; /* Geser ke atas */
            left: -5%; /* Geser ke kiri */
            width: 110%; /* Perbesar untuk krop pinggiran */
            height: 130%; /* Perbesar untuk krop atas-bawah */
            border: 0;
            pointer-events: auto;
        }

        /* Overlay Play Button Custom */
        .overlay-cover {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: 10;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .play-btn-large {
            font-size: 5rem;
            color: #ff2a5f;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
            transition: transform 0.2s;
        }
        
        .overlay-cover:hover .play-btn-large {
            transform: scale(1.1);
        }

        /* Card Thumbnail Effect */
        .vid-card {
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            border-radius: 0.5rem;
            padding: 0.5rem;
        }
        
        .vid-card:hover {
            background-color: #1a1a1a;
            transform: translateY(-2px);
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* Tombol Fullscreen Custom */
        .custom-fs-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            z-index: 20;
            background: rgba(255, 42, 95, 0.8);
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        .custom-fs-btn:hover {
            background: rgba(255, 42, 95, 1);
        }
    </style>
</head>
<body class="antialiased">

    <!-- Header Navigation -->
    <header class="sticky top-0 z-50 p-4 border-b border-gray-800 bg-[#111] shadow-lg flex justify-between items-center">
        <div class="flex items-center gap-3 cursor-pointer" onclick="goHome()">
            <i class="fas fa-video text-[#ff2a5f] text-2xl"></i>
            <h1 class="text-2xl font-black tracking-tighter text-white">Hijabers<span class="text-[#ff2a5f]">AV</span></h1>
        </div>
        <div class="hidden md:block w-1/3 relative">
            <input type="text" placeholder="Cari video..." class="w-full bg-[#1a1a1a] p-2 pl-4 pr-10 rounded-full border border-gray-700 text-sm focus:outline-none focus:border-[#ff2a5f] transition text-gray-200">
            <i class="fas fa-search absolute right-4 top-3 text-gray-500"></i>
        </div>
        <div class="flex gap-4">
            <button class="md:hidden text-gray-400 hover:text-white"><i class="fas fa-search"></i></button>
            <button class="text-gray-400 hover:text-white"><i class="fas fa-bars text-xl"></i></button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        
        <!-- ================= BERANDA (GRID VIDEO) ================= -->
        <section id="home-page" class="block">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-100 border-l-4 border-[#ff2a5f] pl-3">Video Viral Terbaru</h2>
                <span class="text-sm text-gray-500">Menampilkan hasil 1-46</span>
            </div>
            
            <div id="video-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                <!-- Video Cards Generated by JS -->
            </div>

            <!-- Fake Pagination -->
            <div class="mt-12 mb-8 flex justify-center items-center space-x-2">
                <button class="w-10 h-10 flex items-center justify-center bg-[#ff2a5f] text-white font-bold rounded-lg">1</button>
                <button class="w-10 h-10 flex items-center justify-center bg-[#1a1a1a] hover:bg-gray-800 border border-gray-700 rounded-lg transition">2</button>
                <button class="w-10 h-10 flex items-center justify-center bg-[#1a1a1a] hover:bg-gray-800 border border-gray-700 rounded-lg transition">3</button>
                <span class="text-gray-500 px-2">...</span>
                <button class="w-10 h-10 flex items-center justify-center bg-[#1a1a1a] hover:bg-gray-800 border border-gray-700 rounded-lg transition">69</button>
                <button class="px-4 py-2 bg-[#1a1a1a] hover:bg-gray-800 border border-gray-700 rounded-lg font-semibold transition ml-2">Next <i class="fas fa-chevron-right text-xs ml-1"></i></button>
            </div>
        </section>

        <!-- ================= HALAMAN PEMUTARAN VIDEO ================= -->
        <section id="player-page" class="hidden">
            <div class="flex flex-col lg:flex-row gap-6 lg:gap-8">
                
                <!-- Kiri (Player & Info) -->
                <div class="w-full lg:w-8/12 xl:w-9/12">
                    
                    <!-- Player Area -->
                    <div class="video-container shadow-2xl" id="main-player-container">
                        <!-- Custom Fullscreen Button (muncul saat video play) -->
                        <div id="custom-fs-btn" class="custom-fs-btn hidden" onclick="toggleFullScreen()" title="Layar Penuh">
                            <i class="fas fa-expand"></i>
                        </div>
                        
                        <!-- Overlay Fake Player (Click to load) -->
                        <div id="overlay-cover" class="overlay-cover">
                            <i class="fas fa-play-circle play-btn-large"></i>
                        </div>
                        
                        <!-- Tempat Iframe Youtube -->
                        <div id="iframe-holder"></div>
                    </div>

                    <!-- Video Meta Info -->
                    <div class="mt-5 pb-4 border-b border-gray-800">
                        <h1 id="video-title" class="text-xl md:text-2xl font-bold text-gray-100 mb-2"></h1>
                        <div class="flex flex-wrap justify-between items-center gap-4">
                            <div class="flex items-center gap-4 text-sm text-gray-400 font-medium">
                                <span id="video-views" class="flex items-center gap-1"><i class="fas fa-eye text-[#ff2a5f]"></i> </span>
                                <span><i class="fas fa-thumbs-up text-green-500"></i> 98%</span>
                                <span><i class="fas fa-calendar-alt"></i> 1 Hari yang lalu</span>
                            </div>
                            
                            <div class="flex gap-2">
                                <button class="px-4 py-2 bg-[#1a1a1a] hover:bg-gray-800 border border-gray-700 rounded-lg text-sm font-semibold transition flex items-center gap-2">
                                    <i class="fas fa-share"></i> Bagikan
                                </button>
                                <button class="px-4 py-2 bg-[#ff2a5f] hover:bg-red-600 rounded-lg text-sm font-semibold text-white transition flex items-center gap-2">
                                    <i class="fas fa-download"></i> Unduh
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Kanan (Sidebar Related Videos) -->
                <div class="w-full lg:w-4/12 xl:w-3/12">

                    <h3 class="font-bold text-lg mb-4 border-l-4 border-[#ff2a5f] pl-3 text-gray-100">Sedang Hangat</h3>
                    <div id="related-grid" class="flex flex-col gap-3">
                        <!-- Related Videos Generated by JS -->
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script>
        // Data Video Lengkap (46 Link yang diberikan)
        const ytIds = [
            "jq7tFuPiViA", "zEvPwqpQCec", "CGxXEp_Qvbg", "Cp4F3f6Q4Ow", "BnKxxEaHXRw", 
            "Y8TSPNQWgJU", "TunDKjKrWSQ", "BkHCu5mGGeI", "2QjPkiunuQo", "57NvCtMmDMQ", 
            "J2DaJY60fZ0", "lvlfwaTx_Ks", "cVLq11lNjC0", "mEiWNZdNdfA", "2Lz_Sy_qaLA", 
            "ZGj0vvHSBZw", "4D4gi1xaMDc", "mFjTtIUc0M4", "_MoKsKgqSGY", "xBVxy14i3TA", 
            "MK8qwclLnls", "Ad72KOi4IOw", "qYk9T4Z9Sds", "kPZWy93O-f8", "4hDc4gWAfdM", 
            "o98Q5fAv4hI", "HtS8pUb9jOA", "aBAZZibeuao", "TeWWUaFoEuU", "6v_yBQbIk94", 
            "XZa8uKs1snk", "0dvgwovBpco", "j2CFFl_2LBU", "X67LDXqf_NU", "aOgyBnOkb5Q", 
            "2eO4eGtyjOk", "9IoWjfw3Cg0", "bH-fmHwzZC4", "i76FLHIo5Yk", "4whamfBflUM", 
            "ga1csRaZE8c", "MKSP1lSbB0U", "n-SdVEP6nzo", "iQF7WxbXBYI", "qklVBwJlVY0", 
            "ynTmeVfAUxU"
        ];

        // Generator Data Clickbait Palsu
        const fakeTitles = [
            "Hijabers Indo Viral Main di Kosan", "Skandal Jilbab Cantik No Sensor", "Koleksi Pribadi Ukhti Gemes",
            "Hijab kacamata Aksi Panas Terbaru", "Bocor! Video Rahasia Hijabers SMA", "Hijabers Desah Manja Full Durasi",
            "Tante Jilbab Montok Pamer Body", "Hijab syar'i Lupa Matiin Kamera", "Jilbab Pink Viral TikTok Mantap",
            "Aksi Liar Hijabers di Hotel"
        ];

        // Membuat Object Video secara dinamis
        const videos = ytIds.map((id, index) => {
            let randomTitle = fakeTitles[Math.floor(Math.random() * fakeTitles.length)];
            let randomMins = Math.floor(Math.random() * 45) + 5;
            let randomSecs = Math.floor(Math.random() * 59);
            let fakeDur = `${randomMins}:${randomSecs < 10 ? '0'+randomSecs : randomSecs}`;
            let fakeVws = (Math.random() * (5.5 - 0.5) + 0.5).toFixed(1) + "M Views";
            
            return {
                id: index + 1,
                ytId: id,
                title: `${randomTitle} Vol.${index+1} 1080p`,
                duration: fakeDur,
                views: fakeVws
            };
        });

        // ================= LOGIKA UI =================
        
        function renderHome() {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = '';
            
            videos.forEach(v => {
                const card = document.createElement('div');
                card.className = 'vid-card group relative';
                
                const thumbUrl = `https://img.youtube.com/vi/${v.ytId}/mqdefault.jpg`;
                
                card.innerHTML = `
                    <div class="relative overflow-hidden rounded-lg aspect-video bg-gray-900">
                        <img src="${thumbUrl}" alt="Thumbnail" class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                        <div class="absolute bottom-2 right-2 bg-black bg-opacity-80 text-white text-xs font-bold px-1.5 py-0.5 rounded">
                            ${v.duration}
                        </div>
                        <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-40 transition flex items-center justify-center">
                            <i class="fas fa-play text-white text-3xl opacity-0 group-hover:opacity-100 transition"></i>
                        </div>
                    </div>
                    <div class="mt-2">
                        <h3 class="text-sm font-semibold text-gray-200 line-clamp-2 leading-snug group-hover:text-[#ff2a5f] transition">${v.title}</h3>
                        <p class="text-xs text-gray-500 mt-1">${v.views}</p>
                    </div>
                `;
                
                card.onclick = () => {
                    // Klik thumbnail di beranda memutar video
                    openVideoPage(v);
                };
                grid.appendChild(card);
            });
        }

        function renderRelated(excludeId) {
            const grid = document.getElementById('related-grid');
            grid.innerHTML = '';
            
            // Ambil 8 video acak selain yang sedang diputar
            const shuffled = [...videos].filter(v => v.id !== excludeId).sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, 8);
            
            selected.forEach(v => {
                const card = document.createElement('div');
                card.className = 'flex gap-3 cursor-pointer group hover:bg-[#1a1a1a] p-1 rounded transition';
                
                const thumbUrl = `https://img.youtube.com/vi/${v.ytId}/default.jpg`;
                
                card.innerHTML = `
                    <div class="relative w-32 shrink-0">
                        <img src="${thumbUrl}" class="w-full h-20 object-cover rounded">
                        <div class="absolute bottom-1 right-1 bg-black bg-opacity-80 text-white text-[10px] px-1 rounded">${v.duration}</div>
                    </div>
                    <div class="flex flex-col justify-start">
                        <h4 class="text-sm font-semibold text-gray-300 line-clamp-2 leading-tight group-hover:text-[#ff2a5f] transition">${v.title}</h4>
                        <span class="text-xs text-gray-500 mt-1">${v.views}</span>
                    </div>
                `;
                
                card.onclick = () => {
                    // Pindah video dari sidebar
                    openVideoPage(v);
                    window.scrollTo(0, 0);
                };
                grid.appendChild(card);
            });
        }

        function openVideoPage(videoObj) {
            // Sembunyikan Home, Tampilkan Player Page
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('player-page').style.display = 'block';
            window.scrollTo(0, 0);

            // Set Data Info
            document.getElementById('video-title').innerText = videoObj.title;
            document.getElementById('video-views').innerHTML = `<i class="fas fa-eye text-[#ff2a5f]"></i> ${videoObj.views}`;
            
            // Reset Overlay Player
            const overlay = document.getElementById('overlay-cover');
            const iframeHolder = document.getElementById('iframe-holder');
            const fsBtn = document.getElementById('custom-fs-btn');
            
            // Set gambar latar belakang overlay
            const highResThumb = `https://img.youtube.com/vi/${videoObj.ytId}/hqdefault.jpg`;
            overlay.style.backgroundImage = `url('${highResThumb}')`;
            overlay.style.display = 'flex';
            
            // Kosongkan iframe lama
            iframeHolder.innerHTML = '';
            fsBtn.classList.add('hidden'); // Sembunyikan tombol FS sampai video play

            // Event saat tombol play di tengah video ditekan
            overlay.onclick = function() {
                // Load Iframe Youtube (Autoplay ON, Branding OFF)
                iframeHolder.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoObj.ytId}?autoplay=1&modestbranding=1&rel=0&iv_load_policy=3" allow="autoplay; fullscreen"></iframe>`;
                
                // Hilangkan overlay
                overlay.style.display = 'none';
                
                // Tampilkan tombol fullscreen
                fsBtn.classList.remove('hidden');
            };

            // Render ulang video terkait
            renderRelated(videoObj.id);
        }

        function goHome() {
            document.getElementById('player-page').style.display = 'none';
            document.getElementById('home-page').style.display = 'block';
            
            // Hentikan video jika sedang main (kosongkan div)
            document.getElementById('iframe-holder').innerHTML = '';
            document.getElementById('overlay-cover').style.display = 'flex';
            document.getElementById('custom-fs-btn').classList.add('hidden');
        }
        
        // Logika untuk Custom Fullscreen
        function toggleFullScreen() {
            const playerContainer = document.getElementById("main-player-container");
            if (!document.fullscreenElement) {
                playerContainer.requestFullscreen().catch(err => {
                    alert(`Error attempting to enable fullscreen mode: ${err.message} (${err.name})`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Init App
        window.onload = function() {
            renderHome();
        };

    </script>
    
    <!-- IKLAN ADSTERRA SOSIAL BAR BARU -->
    <script src="https://pl30369873.effectivecpmnetwork.com/5d/29/c1/5d29c19a7c91e282c516140c447c358c.js"></script>

</body>
</html>
